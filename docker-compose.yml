# Dread.lol - MongoDB + Valkey. Run: docker compose up -d
#
# Run the app separately: npm run dev (connects to localhost:27017 and localhost:6379).
# In .env set:
#   DATABASE_URL=mongodb://dread:dread@localhost:27017/dread?authSource=admin
#   VALKEY_URL=redis://localhost:6379
#   FILE_STORAGE_PATH=./data/uploads   # local disk; or configure S3_* + AWS_* for object storage (see .env.example)
#   DISCORD_OAUTH_*, AUTH_*
#   POLAR_ACCESS_TOKEN, POLAR_WEBHOOK_SECRET (optional: POLAR_SANDBOX). Product IDs via Admin → Billing.

services:
  mongodb:
    image: mongo:8
    container_name: dread-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-dread}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-dread}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-dread}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8
    container_name: dread-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  mongodb_data:
  valkey_data:
