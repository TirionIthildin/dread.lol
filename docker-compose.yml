# Dread.lol - MongoDB + Valkey. Run: docker compose up -d
#
# Run the app separately: npm run dev (connects to localhost:27017 and localhost:6379).
# In .env set:
#   DATABASE_URL=mongodb://dread:dread@localhost:27017/dread?authSource=admin
#   VALKEY_URL=redis://localhost:6379
#   DISCORD_OAUTH_*, AUTH_*

services:
  mongodb:
    image: mongo:8
    container_name: dread-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-dread}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-dread}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-dread}
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8
    container_name: dread-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # SeaweedFS – internal only; app uses SEAWEED_MASTER_URL (e.g. http://seaweed-master:9333)
  seaweed-master:
    image: chrislusf/seaweedfs:latest
    container_name: dread-seaweed-master
    restart: unless-stopped
    command: ["master", "-ip=seaweed-master", "-ip.bind=0.0.0.0", "-defaultReplication=000", "-mdir=/data"]
    volumes:
      - seaweed_master_data:/data
    ports:
      - "9333:9333"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9333/cluster/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  seaweed-volume:
    image: chrislusf/seaweedfs:latest
    container_name: dread-seaweed-volume
    restart: unless-stopped
    command: ["volume", "-ip=seaweed-volume", "-master=seaweed-master:9333", "-ip.bind=0.0.0.0", "-port=8080", "-dir=/data"]
    volumes:
      - seaweed_volume_data:/data
    depends_on:
      seaweed-master: { condition: service_healthy }
    ports:
      - "8080:8080"

volumes:
  mongodb_data:
  valkey_data:
  seaweed_master_data:
  seaweed_volume_data:
