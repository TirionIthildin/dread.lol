# Dread.lol - Postgres + Valkey only. Run: docker compose up -d
#
# Run the app separately: npm run dev (connects to localhost:5432 and localhost:6379).
# Set DATABASE_URL, VALKEY_URL, DISCORD_OAUTH_*, and AUTH_* in .env for the app.

services:
  postgres:
    image: postgres:16-alpine
    container_name: dread-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dread}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dread}
      POSTGRES_DB: ${POSTGRES_DB:-dread}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dread} -d ${POSTGRES_DB:-dread}"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8
    container_name: dread-valkey
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  valkey_data:
