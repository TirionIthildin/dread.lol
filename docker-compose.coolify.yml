# Production stack for Coolify (or docker compose -f docker-compose.coolify.yml).
# Set MONGO_PASSWORD in the environment (required). Keep dread user root (0:0) so the image
# entrypoint can chown FILE_STORAGE_PATH on the named volume before dropping to nextjs.
services:
  mongodb:
    image: 'mongo:8'
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: '${MONGO_USER:-dread}'
      # No default — set MONGO_PASSWORD in Coolify secrets (do not use a committed default in production).
      MONGO_INITDB_ROOT_PASSWORD: '${MONGO_PASSWORD:?MONGO_PASSWORD must be set in Coolify}'
      MONGO_INITDB_DATABASE: '${MONGO_DB:-dread}'
    volumes:
      - 'mongodb_data:/data/db'
    healthcheck:
      test:
        - CMD
        - mongosh
        - '--eval'
        - "db.adminCommand('ping')"
      interval: 5s
      timeout: 5s
      retries: 5
  valkey:
    image: 'valkey/valkey:8'
    restart: unless-stopped
    volumes:
      - 'valkey_data:/data'
    healthcheck:
      test:
        - CMD
        - valkey-cli
        - ping
      interval: 5s
      timeout: 5s
      retries: 5
  dread:
    image: ghcr.io/tirionithildin/dread.lol:main
    user: "0:0"
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - 'SITE_URL=https://dread.lol'
      - 'NEXT_PUBLIC_SITE_URL=https://dread.lol'
      - 'NEXT_PUBLIC_SITE_DOMAIN=${NEXT_PUBLIC_SITE_DOMAIN:-dread.lol}'
      - 'DATABASE_URL=mongodb://${MONGO_USER:-dread}:${MONGO_PASSWORD:?MONGO_PASSWORD must be set in Coolify}@mongodb:27017/${MONGO_DB:-dread}?authSource=admin'
      - 'VALKEY_URL=redis://valkey:6379'
      # Uploads: S3/R2 when bucket + region set; FILE_STORAGE_PATH for legacy disk reads or hybrid.
      - 'S3_BUCKET=${S3_BUCKET:-}'
      - 'S3_REGION=${S3_REGION:-}'
      - 'AWS_REGION=${AWS_REGION:-}'
      - 'S3_ENDPOINT=${S3_ENDPOINT:-}'
      - 'S3_UPLOAD_PREFIX=${S3_UPLOAD_PREFIX:-}'
      - 'S3_KEY_PREFIX=${S3_KEY_PREFIX:-}'
      - 'S3_FORCE_PATH_STYLE=${S3_FORCE_PATH_STYLE:-}'
      - 'AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}'
      - 'AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}'
      - 'FILE_STORAGE_PATH=${FILE_STORAGE_PATH:-/data/uploads}'
      - 'DISCORD_OAUTH_CLIENT_ID=${DISCORD_OAUTH_CLIENT_ID:-}'
      - 'DISCORD_OAUTH_CLIENT_SECRET=${DISCORD_OAUTH_CLIENT_SECRET:-}'
      - 'AUTH_REDIRECT_URI=${AUTH_REDIRECT_URI:-}'
      - 'AUTH_SECRET=${AUTH_SECRET:-}'
      - 'DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}'
      - 'DISCORD_GUILD_ID=${DISCORD_GUILD_ID:-}'

      # GitHub profile widgets — PAT for GraphQL contribution graph (optional; see GitHub Docs: Authentication + GraphQL API)
      # https://docs.github.com/en/authentication
      - 'GITHUB_TOKEN=${GITHUB_TOKEN:-}'

      - 'ROBLOX_OAUTH_CLIENT_ID=${ROBLOX_OAUTH_CLIENT_ID:-}'
      - 'ROBLOX_OAUTH_CLIENT_SECRET=${ROBLOX_OAUTH_CLIENT_SECRET:-}'
      - 'ROBLOX_OAUTH_REDIRECT_URI=${ROBLOX_OAUTH_REDIRECT_URI:-}'
      - 'POLAR_ACCESS_TOKEN=${POLAR_ACCESS_TOKEN:-}'
      - 'POLAR_WEBHOOK_SECRET=${POLAR_WEBHOOK_SECRET:-}'
      - 'POLAR_SANDBOX=${POLAR_SANDBOX:-}'

      # Admin → Monitoring: schedule GET /api/cron/monitoring with Authorization: Bearer <CRON_SECRET> (e.g. Coolify cron)
      - 'CRON_SECRET=${CRON_SECRET:-}'
    healthcheck:
      test:
        - CMD
        - node
        - '-e'
        - "require('http').get('http://localhost:3000/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)}).on('error', () => process.exit(1))"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    security_opt:
      - 'no-new-privileges:true'
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
      - /app/.next/cache
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    volumes:
      - 'uploads_data:/data/uploads'
volumes:
  mongodb_data: {}
  valkey_data: {}
  uploads_data: {}
