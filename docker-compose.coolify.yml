# ============================================
# Dread.lol - Coolify Deployment
# ============================================
# Use a pre-built image from your registry. Coolify handles proxy and TLS.
#
# Setup in Coolify:
# 1. Create a new Docker Compose resource and use this file.
# 2. Set DREAD_IMAGE to your image (e.g. ghcr.io/your-org/dread-lol:latest).
# 3. Assign the domain to the dread service.
# 4. Set NEXT_PUBLIC_SITE_URL to this site's public URL (e.g. https://dread.lol)
#    so metadata, sitemap, and Open Graph images use absolute URLs.
# 5. Set POSTGRES_PASSWORD (and optionally POSTGRES_USER, POSTGRES_DB) for the DB.
# 6. For live Discord status on profiles: set DISCORD_BOT_TOKEN and DISCORD_GUILD_ID.
#    The bot runs inside the dread container. Without a token it exits gracefully (no restart loop).
# ============================================

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dread}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dread}
      POSTGRES_DB: ${POSTGRES_DB:-dread}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dread} -d ${POSTGRES_DB:-dread}"]
      interval: 5s
      timeout: 5s
      retries: 5

  valkey:
    image: valkey/valkey:8
    restart: unless-stopped
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # SeaweedFS – internal only (no ports exposed); app reaches via SEAWEED_MASTER_URL
  seaweed-master:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: ["master", "-ip=seaweed-master", "-ip.bind=0.0.0.0", "-defaultReplication=000"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:9333/cluster/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  seaweed-volume:
    image: chrislusf/seaweedfs:latest
    restart: unless-stopped
    command: ["volume", "-ip=seaweed-volume", "-master=seaweed-master:9333", "-ip.bind=0.0.0.0", "-port=8080"]
    depends_on:
      seaweed-master: { condition: service_healthy }

  dread:
    image: registry.ithildin.co/poker/dread.lol
    restart: unless-stopped
    depends_on:
      postgres: { condition: service_healthy }
      valkey: { condition: service_healthy }
      seaweed-volume:
        condition: service_started
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_SITE_URL=${SERVICE_FQDN_DREAD_3000}
      - DATABASE_URL=postgres://${POSTGRES_USER:-dread}:${POSTGRES_PASSWORD:-dread}@postgres:5432/${POSTGRES_DB:-dread}
      - VALKEY_URL=redis://valkey:6379
      - SEAWEED_MASTER_URL=http://seaweed-master:9333
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID:-}
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)}).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/tmp
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID

volumes:
  postgres_data:
  valkey_data:
