stages:
  - validate
  - build
  - deploy

# Lint, typecheck, unit tests
validate:
  image: node:20-alpine
  stage: validate
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/
  before_script:
    - npm ci
  script:
    - npm run lint
    - npm run typecheck
    - npm run test
    - npm audit --audit-level=high
  rules:
    - if: $CI_COMMIT_BRANCH

# Dread.lol Docker Build
docker-build:
  needs: [validate]
  image: docker:cli
  stage: build
  services:
    - docker:dind
  variables:
    DOCKER_IMAGE_NAME: $CI_REGISTRY_IMAGE:$CI_COMMIT_REF_SLUG
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_BUILDKIT: "1"
    BUILDKIT_INLINE_CACHE: "1"
  before_script:
    - timeout 30 sh -c 'until docker info > /dev/null 2>&1; do sleep 1; done'
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - docker build --pull --cache-from $CI_REGISTRY_IMAGE:latest --build-arg NEXT_PUBLIC_SITE_URL=https://dread.lol -t "$DOCKER_IMAGE_NAME" .
    - docker push "$DOCKER_IMAGE_NAME"
    - |
      if [[ "$CI_COMMIT_BRANCH" == "$CI_DEFAULT_BRANCH" ]]; then
        docker tag "$DOCKER_IMAGE_NAME" "$CI_REGISTRY_IMAGE:latest"
        docker push "$CI_REGISTRY_IMAGE:latest"
      fi
  rules:
    - if: $CI_COMMIT_BRANCH
      exists:
        - Dockerfile

# Deploy to Coolify after successful build (main branch only)
deploy-coolify:
  stage: deploy
  image: curlimages/curl:latest
  script:
    - |
      curl -X GET "https://coolify.ithildin.co/api/v1/deploy?uuid=rock48o8kccgwsw40g00g0co&force=false" \
        -H "Authorization: Bearer $COOLIFY_API_TOKEN" \
        -H "Accept: application/json" \
        -w "\nHTTP Status: %{http_code}\n" \
        -f
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      exists:
        - Dockerfile
